<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif;color:#262626;background:#F6F3EF;margin:0;padding:16px;}
  .wrap{max-width:720px;margin:0 auto;}
  b{font-weight:600;}
  .ti{vertical-align:-0.12em;line-height:1;}
  .hero{background:#1C1C1C;border-radius:20px;padding:24px 20px 15px;margin:0 0 14px;text-align:center;box-shadow:0 12px 30px rgba(0,0,0,.20);overflow:hidden;}
  .hero-logo{width:min(300px,74%);height:auto;display:block;margin:0 auto;}
  .hero-ekg{position:relative;height:18px;margin:11px 0 0;overflow:hidden;}
  .hero-ekg::before{content:'';position:absolute;top:8px;left:0;right:0;height:2px;background:rgba(255,255,255,.10);}
  .ekg-blip{position:absolute;top:0;left:-72px;width:72px;height:18px;animation:ekg 3.2s linear infinite;}
  @keyframes ekg{from{left:-72px;}to{left:100%;}}
  .hero-sub{font-family:'Montserrat',-apple-system,sans-serif;font-size:10.5px;color:#9b9b9b;letter-spacing:1.6px;margin-top:9px;text-transform:uppercase;}
  .panel{background:#fff;border:1px solid #efe9e0;border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:0 10px 30px rgba(40,30,10,.06);}
  label{font-size:12px;color:#6b7280;display:block;margin-bottom:4px;}
  input[type=text],textarea{width:100%;font-size:16px;padding:12px 13px;border:1px solid #e6e1d8;border-radius:13px;font-family:inherit;background:#fbfaf7;}
  input[type=text]:focus,textarea:focus{outline:none;border-color:#E8541A;background:#fff;}
  textarea{min-height:52px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;font-size:16px;font-weight:600;border:none;border-radius:14px;padding:13px;cursor:pointer;margin-top:10px;}
  .btn-primary{background:#E8541A;color:#fff;box-shadow:0 8px 18px rgba(232,84,26,.28);}
  .btn-primary:active{background:#cf4712;}
  .btn-ghost{background:#fff;color:#1C1C1C;border:1.5px solid #e6e1d8;}
  .btn:disabled{opacity:.5;}
  .hint{font-size:12px;color:#9ca3af;margin-top:8px;line-height:1.5;}
  #loading{display:none;text-align:center;padding:26px 10px;color:#4b5563;font-size:14px;}
  .spin{width:34px;height:34px;border:3px solid #e6e1d8;border-top-color:#E8541A;border-radius:50%;margin:0 auto 12px;animation:sp 1s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  #err{display:none;background:#fef2f2;border:1px solid #fecaca;color:#991b1b;border-radius:10px;padding:12px;font-size:13px;margin-bottom:14px;}
  .card{border-radius:20px;overflow:hidden;border:1px solid #efeef6;background:#fff;box-shadow:0 10px 30px rgba(30,20,60,.08);}
  .card h3{margin:0;}
  .sec{padding:12px 16px;border-bottom:1px solid #eef2f5;}
  .ktitle{font-size:13px;font-weight:700;letter-spacing:.3px;}
  .grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .mini{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:10px;}
  .mini .l{font-size:11px;color:#6b7280;}
  .mini .v{font-size:14px;font-weight:600;margin-top:2px;}
  .chip{font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap;}
  .qw{background:#dcfce7;color:#14532d;border-radius:8px;padding:8px 11px;margin-top:8px;font-size:11.5px;line-height:1.5;}
  .row{display:flex;gap:8px;align-items:flex-start;font-size:12px;margin-bottom:5px;}
  .simrow{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .simrow input[type=range]{flex:1.3;}
  .simrow .val{font-size:12px;font-weight:600;width:64px;text-align:right;}
  .naBtn{font-size:10px;color:#9ca3af;border:1px solid #e6e1d8;background:#fff;border-radius:8px;padding:2px 8px;white-space:nowrap;cursor:pointer;font-family:inherit;flex-shrink:0;}
  .naBtn.on{color:#fff;background:#9ca3af;border-color:#9ca3af;}
  .foot{padding:11px 16px;background:#f8fafc;font-size:10.5px;color:#6b7280;line-height:1.5;}
  @media print{ body{background:#fff;} .btn,.cpNoPrint{display:none!important;} #cockpit{display:block!important;} *{-webkit-print-color-adjust:exact;print-color-adjust:exact;} }
</style></head><body style="background:#eef1f3;padding:16px;"><div class="wrap"><div class="card"><div class="sec" style="text-align:center;color:#6b7280;font-size:13px;padding:26px 16px;"><i class="ti ti-dashboard" style="font-size:30px;color:#cbd5e1;"></i><div style="margin-top:10px;">Lancez d'abord un diagnostic (LIVE → BOUSSOLE) pour composer votre Cockpit.</div></div></div></div><script>(function(){function e(n){return n.toLocaleString("fr-FR");}var u="h";function s(){var P=document.getElementById("sP"),H=document.getElementById("sH"),C=document.getElementById("sC");if(!P||!H||!C)return;var p=+P.value,h=+H.value,c=+C.value;document.getElementById("sPv").textContent=p;document.getElementById("sHv").textContent=h+" h";document.getElementById("sCv").textContent=c+" €";var hrs=p*h*45,eur=Math.round(hrs*c/100)*100,soir=Math.round(hrs/8);var V=document.getElementById("heroV"),S=document.getElementById("heroSub");if(!V)return;if(u==="h"){V.textContent=e(hrs);if(S)S.textContent="≈ "+soir+" soirées rendues — soit ≈ "+e(eur)+" €";}else{V.textContent=e(eur);if(S)S.textContent="≈ "+e(hrs)+" h ("+soir+" soirées) rendues";}}["sP","sH","sC"].forEach(function(id){var x=document.getElementById(id);if(x)x.addEventListener("input",s);});s();})();</script></body></html>
